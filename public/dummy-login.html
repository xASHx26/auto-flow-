<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sleek login - Test Recorder</title>
    <style>
        :root {
            --primary: #10b981;
            --bg: #0f172a;
            --card: #1e293b;
            --text: #f8fafc;
        }
        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }
        .card {
            background-color: var(--card);
            padding: 2.5rem;
            border-radius: 1rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            width: 100%;
            max-width: 400px;
            border: 1px solid rgba(255,255,255,0.05);
        }
        h1 {
            font-size: 1.5rem;
            margin-bottom: 2rem;
            text-align: center;
            font-weight: 800;
            background: linear-gradient(to right, #10b981, #3b82f6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .field {
            margin-bottom: 1.5rem;
        }
        label {
            display: block;
            font-size: 0.875rem;
            font-weight: 500;
            margin-bottom: 0.5rem;
            color: #94a3b8;
        }
        input {
            width: 100%;
            padding: 0.75rem;
            box-sizing: border-box;
            background-color: #0f172a;
            border: 1px solid #334155;
            border-radius: 0.5rem;
            color: white;
            transition: all 0.2s;
        }
        input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(16, 185, 129, 0.2);
        }
        button {
            width: 100%;
            padding: 0.75rem;
            background-color: var(--primary);
            color: white;
            border: none;
            border-radius: 0.5rem;
            font-weight: 700;
            cursor: pointer;
            transition: transform 0.1s, background-color 0.2s;
        }
        button:hover {
            background-color: #059669;
        }
        button:active {
            transform: scale(0.98);
        }
        .hint {
            margin-top: 1.5rem;
            font-size: 0.75rem;
            color: #64748b;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>Welcome Back</h1>
        <div class="field">
            <label for="username">Username</label>
            <input type="text" id="username" name="user" placeholder="Enter username (admin)" autocomplete="off">
        </div>
        <div class="field">
            <label for="password">Password</label>
            <input type="password" id="password" name="pass" placeholder="Enter password (1234)">
        </div>
        <button id="login-btn">Login</button>
        <p class="hint">Use <b>admin</b> / <b>1234</b> to test the recorder.</p>
    </div>

    <script>
        document.getElementById('login-btn').onclick = function() {
            const user = document.getElementById('username').value;
            const pass = document.getElementById('password').value;
            if (user === 'admin' && pass === '1234') {
                window.location.href = 'dummy-success.html';
            } else {
                alert('Invalid credentials');
            }
        }
    </script>
</body>
</html>
